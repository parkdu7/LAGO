services:

  timescaledb:
    image: timescale/timescaledb-ha:pg14-latest
    container_name: timescaledb
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGDATA=/home/postgres/pgdata/data          # ⬅️ 이 이미지의 실제 데이터 경로
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/home/postgres/pgdata/data  # ⬅️ 여기에 마운트해야 영속화됨
      # - ./initdb:/docker-entrypoint-initdb.d:ro   # (선택) 최초 1회만 사용하고 빼두기
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7.2
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-lago}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-lago123}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  finbert:
    build:
      context: ./finbert
      dockerfile: Dockerfile
    container_name: finbert-service
    ports:
      - "5000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  chart-analysis:
    build:
      context: ./chart_analysis
      dockerfile: Dockerfile
    container_name: chart-analysis-service
    ports:
      - "5001:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: BE/Dockerfile
    container_name: spring-backend
    ports:
      - "8081:9000"
    env_file:
      - .env
    environment:
      # Spring 프로파일 설정 (EC2 배포시 prod로 변경)
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}

      # 데이터베이스 연결
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}

      # Redis 연결
      - SPRING_REDIS_HOST=${SPRING_REDIS_HOST:-redis}
      - SPRING_REDIS_PORT=${SPRING_REDIS_PORT:-6379}
      - REDIS_STREAM_KEY=${REDIS_STREAM_KEY:-orders-stream}
      - REDIS_STREAM_CONSUMER_GROUP=${REDIS_STREAM_CONSUMER_GROUP:-lago_group}
      - REDIS_STREAM_CONSUMER_NAME=${REDIS_STREAM_CONSUMER_NAME:-lago_consumer}

      # RabbitMQ 연결
      - SPRING_RABBITMQ_HOST=${RABBITMQ_HOST:-rabbitmq}
      - SPRING_RABBITMQ_PORT=${RABBITMQ_PORT:-5672}
      - SPRING_RABBITMQ_USERNAME=${RABBITMQ_USER:-lago}
      - SPRING_RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-lago123}

      # KIS API (한국투자증권)
      - APP_KEY_A=${APP_KEY_A}
      - APP_SECRET_A=${APP_SECRET_A}
      - APP_KEY_B=${APP_KEY_B}
      - APP_SECRET_B=${APP_SECRET_B}

      # OAuth2
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - KAKAO_CLIENT_ID=${KAKAO_CLIENT_ID}
      - KAKAO_CLIENT_SECRET=${KAKAO_CLIENT_SECRET}
      - KAKAO_REDIRECT_URI=${KAKAO_REDIRECT_URI}

      # JWT
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_TOKEN_EXPIRY=${JWT_ACCESS_TOKEN_EXPIRY:-1800000}
      - JWT_REFRESH_TOKEN_EXPIRY=${JWT_REFRESH_TOKEN_EXPIRY:-604800000}

      # Firebase
      - FIREBASE_KEY_PATH=${FIREBASE_KEY_PATH:-firebaseServiceAccountKey.json}

      # Naver API
      - NAVER_CLIENT_ID=${NAVER_CLIENT_ID:-}
      - NAVER_CLIENT_SECRET=${NAVER_CLIENT_SECRET:-}

      # AI 서비스 연결
      - FINBERT_URL=${FINBERT_URL:-http://finbert-service:8000}
      - FINBERT_SERVER_HOST=${FINBERT_URL:-http://finbert-service:8000}
      - CHART_ANALYSIS_URL=${CHART_ANALYSIS_URL:-http://chart-analysis-service:8000}

      # 시뮬레이터/스케줄러
      - PRICE_SIMULATOR_ENABLED=${PRICE_SIMULATOR_ENABLED:-true}
      - PRICE_SIMULATOR_VOLATILITY=${PRICE_SIMULATOR_VOLATILITY:-1.0}
      - NEWS_SCHEDULER_ENABLED=${NEWS_SCHEDULER_ENABLED:-true}
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      finbert:
        condition: service_healthy
      chart-analysis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  timescale_data:
  rabbitmq_data:
